# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

name: sap-b1-agent
kind: hosted
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  - name: FOUNDRY_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: MCP_SERVER_URL
    value: ${MCP_SERVER_URL}
  - name: MCP_SERVER_NAME
    value: ${MCP_SERVER_NAME:-sap-b1-mcp}
  - name: AGENT_NAME
    value: ${AGENT_NAME:-sap-b1-agent}
  - name: AGENT_TEMPERATURE
    value: ${AGENT_TEMPERATURE:-0.2}
  - name: AGENT_MAX_TOKENS
    value: ${AGENT_MAX_TOKENS:-2048}
  - name: ENVIRONMENT
    value: ${ENVIRONMENT:-development}
description: >
  SAP B1 AI agent hosted by Azure AI Foundry.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Streaming
resources:
  cpu: '0.5'
  memory: 1.0Gi
dockerfile_path: Dockerfile
